version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cron-flow-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: tua url
      STOMP_HOST: activemq
      STOMP_PORT: 61613
      STOMP_USER: admin
      STOMP_PASS: admin
    depends_on:
      - mongo
      - activemq

  mongo:
    image: mongo:7
    container_name: cron-flow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  activemq:
    image: rmohr/activemq:5.18.3
    container_name: cron-flow-activemq
    restart: unless-stopped
    ports:
      - "61613:61613"
      - "8161:8161"

volumes:
  mongo_data:
